<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>咲手机</title>
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="咲手机">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./assets/icons/app-icon.png">
  <script>
    (function () {
      if (!('serviceWorker' in navigator) || !('caches' in window)) return;
      window.addEventListener('load', function () {
        navigator.serviceWorker.getRegistrations()
          .then(function (regs) {
            return Promise.all(regs.map(function (reg) { return reg.unregister(); }));
          })
          .catch(function () {});
        caches.keys()
          .then(function (keys) {
            return Promise.all(keys.map(function (key) { return caches.delete(key); }));
          })
          .catch(function () {});
      });
    })();
  </script>
  <style>
:root {
  --bg: #ffffff;
  --surface: #ffffff;
  --surface-muted: #f9fafb;
  --surface-soft: #f3f4f6;
  --text: #1a1a1a;
  --text-secondary: #6b7280;
  --border: #e5e7eb;
  --accent: #2563eb;
  --accent-strong: #1d4ed8;
  --danger: #dc2626;
  --success: #059669;
  --header-height: 48px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 2px rgba(17, 24, 39, 0.04);
  --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  position: relative;
  width: 100vw;
  height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font: 15px/1.6 var(--font-body);
}

button,
input,
textarea,
select {
  font: inherit;
}

button {
  border: none;
  background: none;
  color: inherit;
}

svg.icon,
svg.icon-sm,
svg.icon-lg,
svg.icon-xl {
  fill: none;
  stroke: currentColor;
}

.icon { width: 20px; height: 20px; }
.icon-sm { width: 16px; height: 16px; }
.icon-lg { width: 24px; height: 24px; }
.icon-xl { width: 40px; height: 40px; }

.app-shell {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--bg);
}

.status-bar {
  height: 28px;
  padding: env(safe-area-inset-top, 0px) 16px 0;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  color: var(--text-secondary);
  font-size: 12px;
}

.status-icons {
  display: flex;
  align-items: center;
  gap: 6px;
}

.page-stack {
  position: relative;
  width: 100%;
  height: calc(100% - 28px - env(safe-area-inset-top, 0px));
}

.page {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  background: var(--bg);
}

.page.active {
  display: flex;
}

.page-header,
.chat-page-header {
  position: sticky;
  top: 0;
  z-index: 30;
  height: var(--header-height);
  min-height: var(--header-height);
  padding: 0 12px;
  border-bottom: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.96);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.header-left,
.header-title-group,
.page-actions,
.status-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.page-title {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.page-subtitle {
  font-size: 12px;
  color: var(--text-secondary);
}

.icon-btn,
.back-btn,
.action-btn,
.chat-tool-btn {
  width: 32px;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  background: var(--surface);
  cursor: pointer;
  flex-shrink: 0;
}

.back-btn {
  width: auto;
  padding: 0 10px;
  gap: 4px;
  font-size: 13px;
}

.page-body,
.page-inner,
.chat-messages {
  min-height: 0;
}

.page-body,
.page-inner {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
}

.page-section {
  margin-bottom: 24px;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
}

.section-link {
  color: var(--accent);
  font-size: 13px;
  cursor: pointer;
}

.card,
.list-group,
.memory-card,
.memory-log-card,
.study-card,
.settings-section,
.message-preview,
.reminder-item,
.ai-memory-item,
.study-empty,
.gateway-info-item,
.study-stat,
.study-plan-line,
.study-log-item,
.study-hero-panel,
.study-support-callout,
.study-tool-btn,
.study-pill,
.study-stat.prominent,
.study-log-item,
.study-hero-panel-primary {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow-sm);
}

.card,
.study-card,
.settings-section {
  padding: 16px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 40px;
  padding: 0 16px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
}

.btn-primary {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}

.btn-secondary {
  background: var(--surface);
  color: var(--text);
}

.btn-danger {
  border-color: #fecaca;
  color: var(--danger);
  background: #fff;
}

.btn-sm {
  min-height: 32px;
  padding: 0 12px;
  font-size: 13px;
}

.btn-block,
.btn-save {
  width: 100%;
}

.form-group,
.setting-item {
  margin-bottom: 12px;
}

.form-row,
.study-form-grid,
.study-meta-grid,
.gateway-info-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.form-row .form-group,
.study-form-grid .form-group,
.study-form-grid .setting-item {
  margin-bottom: 0;
}

.form-group label,
.setting-item label,
.study-eyebrow,
.study-stat-label,
.gateway-info-label {
  display: block;
  margin-bottom: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
}

.form-group input,
.form-group textarea,
.form-group select,
.setting-item input[type="text"],
.setting-item input[type="password"],
.setting-item input[type="number"],
.setting-item textarea,
.setting-item select,
#memory-search,
.chat-input-area textarea {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  color: var(--text);
  padding: 10px 12px;
  outline: none;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus,
.setting-item input:focus,
.setting-item textarea:focus,
.setting-item select:focus,
#memory-search:focus,
.chat-input-area textarea:focus {
  border-color: var(--accent);
}

.home-hero {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 24px;
}

.partner-card {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.partner-top {
  display: flex;
  align-items: center;
  gap: 12px;
}

.avatar-container,
.msg-avatar {
  width: 48px;
  height: 48px;
  border-radius: 999px;
  background: var(--surface-soft);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}

.avatar-placeholder {
  width: 100%;
  height: 100%;
  background: linear-gradient(180deg, #f3f4f6 0%, #e5e7eb 100%);
}

.partner-name {
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
}

.gateway-status-badge,
.reminder-status,
.study-pill,
.memory-log-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 28px;
  padding: 0 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface-muted);
  color: var(--text-secondary);
  font-size: 12px;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: #d1d5db;
}

.status-dot.online { background: var(--success); }
.status-dot.offline { background: #9ca3af; }

.grid-2 {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.action-card {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: 112px;
  cursor: pointer;
}

.icon-box,
.list-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface-muted);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
}

.card-label,
.list-title,
.reminder-content,
.study-log-title,
.study-tool-title,
.memory-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}

.card-sub,
.list-desc,
.msg-name,
.msg-text,
.reminder-meta,
.memory-date,
.ai-memory-time,
.study-log-time,
.study-note,
.study-tool-desc,
.study-hero-copy,
.study-mini-stat span,
.study-mini-stat strong,
.study-plan-line span,
.study-plan-line strong,
.study-log-meta,
.about-info,
.empty-text {
  color: var(--text-secondary);
  font-size: 13px;
}

.list-group {
  padding: 8px;
}

.list-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px;
  border-radius: 10px;
}

.message-preview {
  padding: 16px;
  display: flex;
  gap: 12px;
  cursor: pointer;
}

.msg-content {
  flex: 1;
  min-width: 0;
}

.msg-name {
  font-weight: 600;
  margin-bottom: 4px;
}

.chat-page {
  padding-bottom: calc(72px + env(safe-area-inset-bottom, 0px));
}

.chat-page-header .page-title {
  flex: 1;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  padding-bottom: calc(88px + env(safe-area-inset-bottom, 0px));
}

.chat-message {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 16px;
}

.chat-message.user {
  justify-content: flex-end;
}

.chat-message.system {
  justify-content: center;
}

.chat-message .message-avatar {
  width: 28px;
  height: 28px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface-soft);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  flex-shrink: 0;
}

.chat-message.user .message-avatar {
  display: none;
}

.chat-message .message-body {
  max-width: 80%;
}

.chat-message .message-header {
  display: flex;
  gap: 8px;
  margin-bottom: 6px;
  font-size: 11px;
  color: var(--text-secondary);
}

.chat-message.user .message-header {
  justify-content: flex-end;
}

.chat-message .message-bubble-inner,
.chat-message .system-content {
  border-radius: 12px;
  padding: 12px 14px;
  word-break: break-word;
}

.chat-message .message-bubble-inner {
  background: var(--surface-soft);
  color: var(--text);
}

.chat-message.user .message-bubble-inner {
  background: var(--accent);
  color: #fff;
}

.chat-message.system .system-content {
  background: var(--surface-muted);
  color: var(--text-secondary);
}

.tool-context-indicator {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
  padding: 6px 10px;
  border-radius: 999px;
  background: #eff6ff;
  color: var(--accent);
  font-size: 12px;
}

.typing-dots {
  display: flex;
  gap: 4px;
  padding: 4px 0;
}

.typing-dots span {
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: #9ca3af;
  animation: typing 1s infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

.chat-input-area {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 35;
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 10px 16px calc(10px + env(safe-area-inset-bottom, 0px));
  border-top: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.98);
}

.chat-input-area textarea {
  min-height: 44px;
  max-height: 100px;
  resize: none;
  line-height: 1.5;
}

.chat-send-btn {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  border: 1px solid var(--accent);
  background: var(--accent);
  color: #fff;
}

.chat-send-btn svg {
  stroke: #fff;
}

.memory-toolbar {
  position: relative;
  margin-bottom: 12px;
}

.memory-toolbar .icon-sm {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-secondary);
}

#memory-search {
  padding-left: 36px;
}

.memory-tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 12px;
  margin-bottom: 4px;
}

.memory-tab {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 32px;
  padding: 0 12px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: var(--surface);
  color: var(--text-secondary);
  font-size: 13px;
  white-space: nowrap;
}

.memory-tab.active {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}

.tab-count {
  font-size: 12px;
  opacity: 0.8;
}

.memory-grid,
.memory-log-list,
.study-stack,
.study-log-list,
.study-feed-column,
.study-workspace-main,
.study-workspace-side,
.study-plan-summary,
.setting-actions {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.memory-card,
.memory-log-card,
.ai-memory-item,
.reminder-item {
  padding: 14px;
}

.memory-card-header,
.memory-card-footer,
.memory-log-header,
.reminder-item,
.study-session-overview,
.study-section-head,
.study-shell-header,
.study-actions,
.study-shell-actions,
.study-inline,
.study-log-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.memory-content,
.ai-memory-content,
.study-log-body {
  color: var(--text-secondary);
  font-size: 14px;
  line-height: 1.6;
}

.memory-card-body,
.memory-log-body {
  margin-top: 8px;
}

.memory-log-body {
  display: none;
}

.memory-log-body.expanded {
  display: block;
}

.memory-log-main {
  flex: 1;
  min-width: 0;
}

.memory-log-side {
  text-align: right;
}

.memory-log-toggle-label {
  font-size: 12px;
  color: var(--text-secondary);
}

.reminder-info {
  flex: 1;
  min-width: 0;
}

.reminder-status.pending {
  color: #92400e;
  background: #fffbeb;
}

.reminder-status.delivered {
  color: var(--success);
  background: #ecfdf5;
}

.study-workspace-shell,
.study-hero-grid,
.study-workbench-strip,
.study-feed-grid,
.study-metric-band {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.study-card h4,
.settings-section h4,
.study-session-title,
.study-hero-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

.study-session-title,
.study-hero-title {
  font-size: 18px;
}

.study-hero-kicker,
.study-feed-heading {
  color: var(--text-secondary);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.study-tool-btn {
  padding: 14px;
  text-align: left;
}

.study-pill.active {
  border-color: var(--accent);
  background: #eff6ff;
  color: var(--accent);
}

.study-balance-bar {
  width: 100%;
  height: 8px;
  border-radius: 999px;
  background: var(--surface-soft);
  overflow: hidden;
  display: flex;
}

.study-balance-focus { background: #2563eb; }
.study-balance-review { background: #93c5fd; }
.study-balance-recovery { background: #dbeafe; }

.settings-section {
  padding: 0;
  overflow: hidden;
}

.settings-section h4 {
  padding: 14px 16px 8px;
  margin: 0;
}

.setting-item {
  min-height: 48px;
  margin: 0;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
}

.setting-item.toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.setting-item.toggle label {
  margin: 0;
}

.switch {
  position: relative;
  width: 44px;
  height: 24px;
  display: inline-block;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  inset: 0;
  border-radius: 999px;
  background: #d1d5db;
  transition: 0.2s;
}

.slider::before {
  content: "";
  position: absolute;
  left: 3px;
  top: 3px;
  width: 18px;
  height: 18px;
  border-radius: 999px;
  background: #fff;
  transition: 0.2s;
  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.16);
}

.switch input:checked + .slider {
  background: var(--accent);
}

.switch input:checked + .slider::before {
  transform: translateX(20px);
}

.theme-selector {
  display: flex;
  gap: 10px;
}

.theme-option {
  width: 28px;
  height: 28px;
  border-radius: 999px;
  border: 2px solid transparent;
  cursor: pointer;
}

.theme-option.active {
  border-color: var(--text);
}

.empty-state {
  padding: 48px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  color: var(--text-secondary);
}

#toast-container {
  position: fixed;
  top: calc(16px + env(safe-area-inset-top, 0px));
  left: 50%;
  transform: translateX(-50%);
  z-index: 1200;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}

.toast {
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.98);
  color: var(--text);
  box-shadow: var(--shadow-sm);
  opacity: 0;
  transform: translateY(-8px);
  transition: opacity 0.2s ease, transform 0.2s ease;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.toast-success { border-left: 3px solid var(--success); }
.toast-error { border-left: 3px solid var(--danger); }
.toast-warning { border-left: 3px solid #d97706; }
.toast-info { border-left: 3px solid var(--accent); }

.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 1100;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  background: rgba(17, 24, 39, 0.3);
  opacity: 0;
  transition: opacity 0.2s ease;
}

.modal-overlay.show {
  opacity: 1;
}

.modal-container {
  width: 100%;
  max-height: 86vh;
  background: var(--surface);
  border-top-left-radius: 16px;
  border-top-right-radius: 16px;
  border: 1px solid var(--border);
  border-bottom: none;
  transform: translateY(100%);
  transition: transform 0.2s ease;
  display: flex;
  flex-direction: column;
}

.modal-overlay.show .modal-container {
  transform: translateY(0);
}

.modal-header,
.modal-footer {
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.modal-header {
  border-bottom: 1px solid var(--border);
}

.modal-body {
  overflow-y: auto;
  padding: 16px;
}

.modal-close {
  width: 32px;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--text-secondary);
}

.drawer-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(17, 24, 39, 0.18);
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.2s ease;
  z-index: 90;
}

.drawer-backdrop.show {
  opacity: 1;
  visibility: visible;
}

.nav-drawer {
  position: fixed;
  top: 0;
  left: 0;
  width: min(78vw, 280px);
  height: 100dvh;
  padding: calc(16px + env(safe-area-inset-top, 0px)) 16px 16px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  transform: translateX(-100%);
  transition: transform 0.2s ease;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.nav-drawer.open {
  transform: translateX(0);
}

.drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.drawer-title {
  font-size: 16px;
  font-weight: 600;
}

.drawer-nav {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.tab-item {
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 44px;
  padding: 0 12px;
  border-radius: 10px;
  color: var(--text-secondary);
  cursor: pointer;
  white-space: nowrap;
}

.tab-item.active {
  background: #eff6ff;
  color: var(--accent);
}

.tab-label {
  font-size: 14px;
  font-weight: 500;
}

.visually-hidden-nav {
  display: none;
}

.updated {
  outline: 2px solid #dbeafe;
}

@keyframes typing {
  0%, 100% { opacity: 0.35; }
  50% { opacity: 1; }
}

@media (max-width: 374px) {
  .grid-2,
  .form-row,

  .study-meta-grid,
  .gateway-info-grid {
    grid-template-columns: 1fr;
  }

  .page-title {

  }
}

</div>

<script>
  function toggleDrawer(force) {
    var drawer = document.getElementById('nav-drawer');
    var backdrop = document.getElementById('drawer-backdrop');
    if (!drawer || !backdrop) return;
    var open = typeof force === 'boolean' ? force : !drawer.classList.contains('open');
    drawer.classList.toggle('open', open);
    backdrop.classList.toggle('show', open);
    drawer.setAttribute('aria-hidden', open ? 'false' : 'true');
  }

  document.addEventListener('keydown', function (event) {
    if (event.key === 'Escape') toggleDrawer(false);
  });
</script>
<script src="app.js"></script>
</body>
</html>
